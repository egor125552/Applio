name: Seed-VC Colab CI

on:
  push:
    branches:
      - main
      - agent/seed-vc-colab
    paths:
      - "seed_vc_colab/**"
      - ".github/workflows/seed-vc-colab-ci.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "seed_vc_colab/**"
      - "ci-relay/aaja-audio-engine-trigger.txt"
      - ".github/workflows/seed-vc-colab-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: seed-vc-colab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notebook-contract:
    if: github.event_name != 'pull_request' || github.head_ref != 'agent/aaja-audio-engine-ci-relay'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install -q pytest
      - run: pytest -q seed_vc_colab/tests/test_notebook_contract.py seed_vc_colab/tests/test_script_contract.py

  dependency-and-server-smoke:
    if: github.event_name != 'pull_request' || github.head_ref != 'agent/aaja-audio-engine-ci-relay'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: seed_vc_colab/requirements-colab.txt

      - name: Install CPU PyTorch
        run: |
          python -m pip install -q --upgrade pip setuptools wheel
          python -m pip install -q \
            torch==2.4.0 torchaudio==2.4.0 torchvision==0.19.0 \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install Seed-VC runtime dependencies
        run: python -m pip install -q -r seed_vc_colab/requirements-colab.txt

      - name: Checkout pinned official Seed-VC
        run: |
          git clone --filter=blob:none --no-checkout https://github.com/Plachtaa/seed-vc.git "$RUNNER_TEMP/seed-vc"
          git -C "$RUNNER_TEMP/seed-vc" fetch --depth 1 origin 51383efd921027683c89e5348211d93ff12ac2a8
          git -C "$RUNNER_TEMP/seed-vc" checkout --detach 51383efd921027683c89e5348211d93ff12ac2a8
          test "$(git -C "$RUNNER_TEMP/seed-vc" rev-parse HEAD)" = "51383efd921027683c89e5348211d93ff12ac2a8"

      - name: Import model code and start Gradio server
        env:
          SEED_VC_DIR: ${{ runner.temp }}/seed-vc
        run: python seed_vc_colab/tests/smoke_imports.py

      - name: Verify remote model files
        run: python seed_vc_colab/tests/check_remote_models.py

  aaja-audio-engine-relay:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/aaja-audio-engine-ci-relay'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Aaja engine branch
        uses: actions/checkout@v4
        with:
          repository: egor125552/rust-Aaja-game-engine-web
          ref: agent/audio-engine-v0.1
          path: aaja

      - name: Expand project payload
        working-directory: aaja
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          chunks=(bootstrap/chunk-*)
          if (( ${#chunks[@]} == 0 )); then
            echo "Expected bootstrap payload was not found" >&2
            exit 1
          fi
          cat "${chunks[@]}" | base64 --decode > "$RUNNER_TEMP/aaja-project.tar.gz"
          tar -xzf "$RUNNER_TEMP/aaja-project.tar.gz" -C .
          rm -rf bootstrap
          test -f Cargo.toml
          test -f package.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: aaja/package-lock.json

      - name: Install JavaScript dependencies
        working-directory: aaja
        run: npm ci

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Rust formatting
        working-directory: aaja
        run: npm run format:rust

      - name: Rust lint
        working-directory: aaja
        run: npm run lint:rust

      - name: Unit tests
        working-directory: aaja
        run: npm test

      - name: Production build
        working-directory: aaja
        run: npm run build

      - name: Verify generated WASM
        working-directory: aaja
        run: |
          test -s packages/engine/dist/wasm/audio_game_core_bg.wasm
          npm run test:wasm

      - name: Install browser runtimes
        working-directory: aaja
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Browser smoke tests
        working-directory: aaja
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aaja-audio-engine-${{ github.run_attempt }}
          path: |
            aaja/demo/dist
            aaja/packages/engine/dist
            aaja/playwright-report
          if-no-files-found: warn
