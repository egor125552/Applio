name: CEVC Adapter v2 browser E2E

on:
  push:
    branches:
      - agent/compact-expressive-vc-architecture
    paths:
      - "tabs/cevc2b/**"
      - "rvc/train/cevc/**"
      - "rvc/lib/algorithm/**"
      - "tests/cevc_adapter_v2_e2e_*.py"
      - "requirements.txt"
      - ".github/workflows/cevc-adapter-v2-browser-e2e.yml"
  pull_request:
    paths:
      - "tabs/cevc2b/**"
      - "rvc/train/cevc/**"
      - "rvc/lib/algorithm/**"
      - "tests/cevc_adapter_v2_e2e_*.py"
      - "requirements.txt"
      - ".github/workflows/cevc-adapter-v2-browser-e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-training-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CEVC_E2E_PORT: "7867"
      GRADIO_ANALYTICS_ENABLED: "False"
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install the complete Colab dependency set
        run: |
          "$HOME/.local/bin/uv" pip install --quiet --system \
            -r requirements.txt \
            --extra-index-url https://download.pytorch.org/whl/cu128 \
            --index-strategy unsafe-best-match
          python -m pip install --quiet playwright

      - name: Install Chromium for real browser interaction
        run: python -m playwright install --with-deps chromium

      - name: Prepare application config
        run: cp -n assets/config_template.json assets/config.json

      - name: Compile the exact browser E2E entrypoints
        run: |
          python -m py_compile \
            tests/cevc_adapter_v2_e2e_fixture.py \
            tests/cevc_adapter_v2_e2e_strengthen_fixture.py \
            tests/cevc_adapter_v2_e2e_app.py \
            tests/cevc_adapter_v2_e2e_browser.py

      - name: Build a mini RVC experiment from public real speech
        shell: bash
        run: |
          set -euo pipefail
          python -u -m tests.cevc_adapter_v2_e2e_fixture 2>&1 | tee /tmp/cevc_adapter_v2_e2e_fixture.log
          python -u -m tests.cevc_adapter_v2_e2e_strengthen_fixture 2>&1 | tee -a /tmp/cevc_adapter_v2_e2e_fixture.log
          test -s logs/cevc_e2e/public_jfk.flac
          test -s logs/cevc_e2e/G_1.pth
          test -s logs/cevc_e2e/cevc2b/critic/roughness_critic_best.pth
          test -s logs/cevc_e2e/filelist.txt
          test -s logs/cevc_e2e/config.json
          python -u - <<'PY'
          import json
          import math
          from pathlib import Path
          import torch

          root = Path("logs/cevc_e2e")
          config_path = root / "config.json"
          config = json.loads(config_path.read_text())

          # Match a real Applio experiment. Runtime filelist paths are not serialized
          # into config.json; the training command supplies them when building a loader.
          config["data"].pop("training_files", None)
          config_path.write_text(json.dumps(config, indent=2), encoding="utf-8")
          config = json.loads(config_path.read_text())
          assert "training_files" not in config["data"]

          assert config["data"]["filter_length"] // 2 + 1 == 33
          assert math.prod(config["model"]["upsample_rates"]) == config["data"]["hop_length"]
          checkpoint = torch.load(root / "G_1.pth", map_location="cpu", weights_only=True)
          assert checkpoint.get("model"), "Mini RVC checkpoint has no model state"
          rows = [row for row in (root / "filelist.txt").read_text().splitlines() if row]
          assert len(rows) == 30, len(rows)
          print("Mini RVC fixture matches the real config shape without training_files.")
          PY

      - name: Start the real CEVC 2B Gradio interface
        run: |
          python -u -m tests.cevc_adapter_v2_e2e_app > /tmp/cevc_adapter_v2_e2e_server.log 2>&1 &
          echo $! > /tmp/cevc_adapter_v2_e2e_server.pid
          for attempt in $(seq 1 120); do
            if curl --fail --silent "http://127.0.0.1:${CEVC_E2E_PORT}" >/dev/null; then
              echo "Gradio is ready."
              exit 0
            fi
            sleep 1
          done
          cat /tmp/cevc_adapter_v2_e2e_server.log
          exit 1

      - name: Click Stage 1, train critic and train Adapter v2 through Chromium
        shell: bash
        run: |
          set -euo pipefail
          python -u -m tests.cevc_adapter_v2_e2e_browser 2>&1 | tee /tmp/cevc_adapter_v2_e2e_browser.log

      - name: Reject hidden server tracebacks
        if: always()
        run: |
          cat /tmp/cevc_adapter_v2_e2e_server.log || true
          if grep -q "Traceback (most recent call last)" /tmp/cevc_adapter_v2_e2e_server.log; then
            echo "A traceback occurred in the real Gradio server path."
            exit 1
          fi

      - name: Verify at least 20 real optimizer steps and all reports
        run: |
          python -u - <<'PY'
          import json
          from pathlib import Path

          root = Path("logs/cevc_e2e/cevc2b/adapter_v2")
          report = json.loads((root / "browser_e2e_report.json").read_text())
          summary = json.loads((root / "adapter_v2_summary.json").read_text())
          critic = report["critic"]
          adapter = report["adapter_v2"]
          assert critic["optimizer_steps_completed"] >= 20, critic
          assert adapter["optimizer_steps_completed"] >= 20, adapter
          assert adapter["epochs"] == 30, adapter
          assert adapter["production_prior_latent_path"] is True, adapter
          assert report["total_optimizer_steps_completed"] >= 40, report

          batch_selection = summary["batch_selection"]
          assert batch_selection["requested"] == "auto", batch_selection
          assert int(batch_selection["selected"]) == 4, batch_selection
          assert batch_selection["selection_device"] == "cpu", batch_selection
          assert batch_selection["automatic_gpu_probe"] is False, batch_selection
          probe_path = root / "adapter_v2_batch_probe.json"
          assert probe_path.is_file() and probe_path.stat().st_size > 0, probe_path

          for name in (
            "adapter_v2_summary.json",
            "adapter_v2_history.json",
            "adapter_v2_batch_probe.json",
            "roughness_adapter_v2_best.pth",
            "roughness_adapter_v2_final.pth",
            "browser_e2e_report.json",
            "browser_final.png",
          ):
            path = root / name
            assert path.is_file() and path.stat().st_size > 0, path
          critic_root = Path("logs/cevc_e2e/cevc2b/critic")
          for name in (
            "critic_summary.json",
            "critic_history.json",
            "roughness_critic_best.pth",
            "roughness_critic_final.pth",
          ):
            path = critic_root / name
            assert path.is_file() and path.stat().st_size > 0, path
          export_path = Path("logs/cevc_e2e/cevc_e2e_v2.cevc.pth")
          assert export_path.is_file() and export_path.stat().st_size > 0
          print(json.dumps(report, indent=2))
          PY

      - name: Upload E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cevc-adapter-v2-browser-e2e
          if-no-files-found: warn
          path: |
            /tmp/cevc_adapter_v2_e2e_fixture.log
            /tmp/cevc_adapter_v2_e2e_server.log
            /tmp/cevc_adapter_v2_e2e_browser.log
            logs/cevc_e2e/cevc2b/experiment2b_manifest.json
            logs/cevc_e2e/cevc2b/real_profile/*.json
            logs/cevc_e2e/cevc2b/critic/*.json
            logs/cevc_e2e/cevc2b/critic/*.pth
            logs/cevc_e2e/cevc2b/adapter_v2/*.json
            logs/cevc_e2e/cevc2b/adapter_v2/*.png
            logs/cevc_e2e/cevc2b/adapter_v2/*.pth
            logs/cevc_e2e/cevc_e2e_v2.cevc.pth

      - name: Stop Gradio
        if: always()
        run: |
          if test -f /tmp/cevc_adapter_v2_e2e_server.pid; then
            kill "$(cat /tmp/cevc_adapter_v2_e2e_server.pid)" || true
          fi
