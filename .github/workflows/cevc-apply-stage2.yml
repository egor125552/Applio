name: Apply CEVC stage 2

on:
  push:
    branches:
      - agent/compact-expressive-vc-architecture
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - name: Decode and apply validated patch
        run: |
          base64 -d .cevc-stage2/part00 | gzip -d > /tmp/cevc-stage2.patch
          git apply --check /tmp/cevc-stage2.patch
          git apply /tmp/cevc-stage2.patch
          git restore .github/workflows/cevc-registry-tests.yml
      - name: Remove temporary patch payload
        run: rm -rf .cevc-stage2
      - name: Commit CEVC stage 2 code
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add CEVC Roughness Adapter training path"
          git push origin "HEAD:${TARGET_BRANCH}"
