name: Apply CEVC stage 2

on:
  push:
    branches:
      - agent/compact-expressive-vc-architecture

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode and apply validated patch
        run: |
          base64 -d .cevc-stage2/part00 | gzip -d > /tmp/cevc-stage2.patch
          git apply --check /tmp/cevc-stage2.patch
          git apply /tmp/cevc-stage2.patch
      - name: Remove temporary delivery files
        run: |
          rm -rf .cevc-stage2
          rm -f .github/workflows/cevc-apply-stage2.yml
          rm -f .github/workflows/cevc-source-snapshot.yml
      - name: Commit CEVC stage 2
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add CEVC Roughness Adapter training path"
          git push origin "HEAD:${GITHUB_REF_NAME}"
