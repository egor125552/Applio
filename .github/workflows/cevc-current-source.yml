name: CEVC robustness patch

on:
  push:
    branches:
      - agent/compact-expressive-vc-architecture
    paths:
      - ".github/workflows/cevc-current-source.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/compact-expressive-vc-architecture
      - name: Apply focused CEVC robustness fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          preprocess_path = Path("rvc/train/preprocess/preprocess.py")
          preprocess = preprocess_path.read_text(encoding="utf-8")
          old = '''            for f in filenames:
                          if f.lower().endswith(SUPPORTED_AUDIO_EXTENSIONS):
                              files.append((os.path.join(root, f), idx, sid))
                              idx += 1
          '''
          new = '''            for f in filenames:
                          if f.startswith(".") or f.startswith("._"):
                              continue
                          if f.lower().endswith(SUPPORTED_AUDIO_EXTENSIONS):
                              files.append((os.path.join(root, f), idx, sid))
                              idx += 1
          '''
          if old not in preprocess:
              raise SystemExit("preprocess target block not found")
          preprocess_path.write_text(preprocess.replace(old, new, 1), encoding="utf-8")

          trainer_path = Path("rvc/train/cevc/train_adapter.py")
          trainer = trainer_path.read_text(encoding="utf-8")
          old = '''    validation = validate_dataset(experiment_dir)
              if args.validate_only:
                  return json.dumps(validation, ensure_ascii=False, indent=2)
          
              checkpoint_path = find_latest_generator_checkpoint(experiment_dir)
          '''
          new = '''    validation = validate_dataset(experiment_dir)
              checkpoint_path = find_latest_generator_checkpoint(experiment_dir)
              validation["base_checkpoint"] = os.path.basename(checkpoint_path)
              validation["base_checkpoint_epoch"] = _checkpoint_epoch(checkpoint_path)
              if args.validate_only:
                  return json.dumps(validation, ensure_ascii=False, indent=2)
          '''
          if old not in trainer:
              raise SystemExit("trainer validation target block not found")
          trainer_path.write_text(trainer.replace(old, new, 1), encoding="utf-8")

          test_path = Path("tests/test_cevc_training_integration.py")
          tests = test_path.read_text(encoding="utf-8")
          old = '''        self.assertIn('".m4a"', self.preprocess)
                  self.assertIn("cevc_source_manifest.json", self.preprocess)
                  self.assertIn("infer_label_hint(filename)", self.preprocess)
          '''
          new = '''        self.assertIn('".m4a"', self.preprocess)
                  self.assertIn('f.startswith(".")', self.preprocess)
                  self.assertIn("cevc_source_manifest.json", self.preprocess)
                  self.assertIn("infer_label_hint(filename)", self.preprocess)
          '''
          if old not in tests:
              raise SystemExit("preprocess integration-test block not found")
          tests = tests.replace(old, new, 1)
          old = '''        self.assertIn(".cevc.pth", self.trainer)
                  self.assertIn("--validate-only", self.trainer)
          '''
          new = '''        self.assertIn(".cevc.pth", self.trainer)
                  self.assertIn("--validate-only", self.trainer)
                  self.assertIn('validation["base_checkpoint"]', self.trainer)
          '''
          if old not in tests:
              raise SystemExit("trainer integration-test block not found")
          test_path.write_text(tests.replace(old, new, 1), encoding="utf-8")

          progress_path = Path("docs/CEVC_PROGRESS.md")
          progress = progress_path.read_text(encoding="utf-8")
          marker = "- [x] Extend preprocessing to accept iPhone M4A/AAC inputs and preserve source filenames/labels.\n"
          addition = marker + "- [x] Ignore hidden macOS metadata files and make CEVC data validation require a real `G_*.pth` base checkpoint.\n"
          if marker not in progress:
              raise SystemExit("progress marker not found")
          progress_path.write_text(progress.replace(marker, addition, 1), encoding="utf-8")
          PY
      - name: Validate focused changes
        run: |
          python -m py_compile \
            rvc/train/preprocess/preprocess.py \
            rvc/train/cevc/train_adapter.py \
            tests/test_cevc_training_integration.py
          python -m unittest tests.test_cevc_training_integration -v
      - name: Commit patch and remove temporary workflow
        run: |
          rm .github/workflows/cevc-current-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            rvc/train/preprocess/preprocess.py \
            rvc/train/cevc/train_adapter.py \
            tests/test_cevc_training_integration.py \
            docs/CEVC_PROGRESS.md \
            .github/workflows/cevc-current-source.yml
          git commit -m "Harden CEVC dataset and checkpoint validation"
          git push origin HEAD:agent/compact-expressive-vc-architecture
