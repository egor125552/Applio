name: CEVC source snapshot

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: cevc-source-${{ github.sha }}
          path: |
            .github/workflows
            assets
            docs
            rvc
            tabs
            tests
            app.py
            core.py
            requirements.txt
            pyproject.toml
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
